<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Problem Bank{% endblock %}</title>

    <!-- MathJax for rendering LaTeX in the browser -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        /* ---- TOKENS ---- */
        :root {
            --bg:          #f9f8f5;
            --surface:     #ffffff;
            --border:      rgba(0,0,0,0.1);
            --text:        #28251d;
            --text-muted:  #6b6860;
            --primary:     #01696f;
            --primary-hover: #0c4e54;
            --success:     #437a22;
            --success-bg:  #f0f7f1;
            --success-border: #d4edda;
            --hint-bg:     #fffbf0;
            --hint-border: #f0d080;
            --badge-found: #e8f4fd;
            --badge-inter: #fff3cd;
            --badge-diff:  #fde8e8;
            --radius:      8px;
            --shadow:      0 2px 8px rgba(0,0,0,0.08);
            --font-body:   'Work Sans', sans-serif;
            --font-serif:  'Source Serif 4', Georgia, serif;
        }

        /* ---- BASE ---- */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body {
            font-family: var(--font-body);
            font-size: 1rem;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            line-height: 1.6;
        }

        /* ---- LAYOUT ---- */
        .site-wrapper {
            max-width: 820px;
            margin: 0 auto;
            padding: 0 20px 60px;
        }

        /* ---- HEADER / NAV ---- */
        header {
            border-bottom: 1px solid var(--border);
            margin-bottom: 36px;
            padding: 20px 0 16px;
        }
        .header-inner {
            max-width: 820px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .site-title {
            font-family: var(--font-serif);
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--primary);
            text-decoration: none;
        }
        nav { display: flex; gap: 24px; flex-wrap: wrap; }
        nav a {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 180ms ease;
        }
        nav a:hover { color: var(--primary); }
        nav a.active { color: var(--primary); border-bottom: 2px solid var(--primary); }

        /* ---- TYPOGRAPHY ---- */
        h1 {
            font-family: var(--font-serif);
            font-size: clamp(1.5rem, 3vw, 2rem);
            font-weight: 600;
            margin-bottom: 6px;
            line-height: 1.2;
        }
        h2 {
            font-family: var(--font-serif);
            font-size: 1.2rem;
            font-weight: 600;
            margin: 28px 0 10px;
        }
        p { margin-bottom: 12px; max-width: 70ch; }
        ul, ol { padding-left: 20px; margin-bottom: 12px; }
        li { margin-bottom: 6px; }
        a { color: var(--primary); }

        /* ---- FORM ---- */
        .form-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            margin-bottom: 28px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }
        select {
            padding: 9px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.95rem;
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            cursor: pointer;
            transition: border-color 180ms ease;
        }
        select:focus {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        /* ---- BUTTONS ---- */
        .btn {
            display: inline-block;
            padding: 10px 22px;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: var(--font-body);
            cursor: pointer;
            border: none;
            text-decoration: none;
            transition: background 180ms ease, transform 100ms ease;
        }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); color: white; }
        .btn-secondary {
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
        }
        .btn-secondary:hover { background: var(--primary); color: white; }

        /* ---- PROBLEM CARD ---- */
        .problem-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 28px;
            box-shadow: var(--shadow);
            margin-bottom: 24px;
        }
        .problem-meta {
            display: flex;
            gap: 8px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .badge-foundational { background: var(--badge-found); color: #1a6fa8; }
        .badge-intermediate { background: var(--badge-inter); color: #856404; }
        .badge-difficult    { background: var(--badge-diff);  color: #a02020; }
        .badge-marks        { background: #f0f0f0; color: var(--text-muted); }
        .badge-exam         { background: #ede8f5; color: #6a30b0; }

        .question {
            font-family: var(--font-serif);
            font-size: 1.05rem;
            line-height: 1.75;
            margin-bottom: 20px;
        }

        /* ---- TOPIC LINK ---- */
        .topic-link {
            font-size: 0.88rem;
            color: var(--text-muted);
            margin: 12px 0;
        }
        .topic-link a { font-weight: 500; }

        /* ---- ANSWER REVEAL ---- */
        .answer-reveal {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            margin-top: 16px;
        }
        .answer-reveal > summary {
            padding: 12px 16px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--primary);
            list-style: none;
            user-select: none;
            background: #f0fafa;
        }
        .answer-reveal > summary::-webkit-details-marker { display: none; }
        .answer-reveal > summary::before { content: '▶  '; font-size: 0.7rem; }
        .answer-reveal[open] > summary::before { content: '▼  '; }
        .answer-reveal > summary:hover { background: #e0f2f2; }

        .answer {
            padding: 20px 16px;
            border-top: 1px solid var(--border);
            font-family: var(--font-serif);
            line-height: 1.8;
        }

        /* ---- HINT REVEAL ---- */
        .hint-reveal {
            margin: 16px 16px 0;
            border: 1px solid var(--hint-border);
            border-radius: 6px;
            background: var(--hint-bg);
            overflow: hidden;
        }
        .hint-reveal summary {
            padding: 10px 14px;
            cursor: pointer;
            color: #8a6000;
            font-weight: 600;
            font-size: 0.9rem;
            list-style: none;
            user-select: none;
        }
        .hint-reveal summary::-webkit-details-marker { display: none; }
        .hint-reveal summary:hover { background: #fff5cc; }
        .hint {
            padding: 16px;
            border-top: 1px solid var(--hint-border);
            font-size: 0.95rem;
            line-height: 1.75;
        }

        /* ---- TOPIC PAGE ---- */
        .topic-header { margin-bottom: 28px; }
        .formula-block {
            background: var(--surface);
            border-left: 3px solid var(--primary);
            border-radius: 0 var(--radius) var(--radius) 0;
            padding: 14px 20px;
            margin: 10px 0;
            font-size: 1.05rem;
            box-shadow: var(--shadow);
        }
        .tips-list { list-style: none; padding: 0; }
        .tips-list li {
            padding: 10px 14px 10px 36px;
            position: relative;
            margin-bottom: 8px;
            background: var(--surface);
            border-radius: 6px;
            box-shadow: var(--shadow);
        }
        .tips-list li::before {
            content: '✓';
            position: absolute;
            left: 12px;
            color: var(--success);
            font-weight: 700;
        }

        /* ---- ERROR ---- */
        .error {
            color: #a02020;
            background: #fde8e8;
            padding: 10px 14px;
            border-radius: 6px;
            margin-bottom: 16px;
        }

        /* ---- PRINT ---- */
        @media print {
            header, nav, form, .btn, .hint-reveal, .answer-reveal summary { display: none; }
            .answer { display: block !important; }
        }

        /* ---- MOBILE ---- */
        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr 1fr; }
            .problem-card { padding: 20px; }
        }
    </style>

    <script>
    window.MathJax = {
        tex: {
            inlineMath: [['\\(', '\\)'], ['$', '$']]
        },
        svg: {
            fontCache: 'global'
            }
        };
        </script>
        <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

</head>
<body>

<header>
    <div class="header-inner">
        <a href="/" class="site-title">Problem Bank</a>
        <nav>
            <a href="/">Generator</a>
            <a href="/topics">Topics</a>
            <a href="/about">About</a>
        </nav>
    </div>
</header>

<div class="site-wrapper">
    {% block content %}{% endblock %}
</div>

</body>
</html>
